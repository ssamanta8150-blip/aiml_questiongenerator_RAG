<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💡 AI Current Affairs & Quiz App</title>
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            /* Background image with overlay for readability */
            background: linear-gradient(rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.1)), 
                        url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=2000&auto=format&fit=crop');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: #212529;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background-color: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(5px);
        }

        .content-container {
            padding-top: 30px;
            padding-bottom: 50px;
        }

        /* Glassmorphism Effect for Boxes */
        .glass-box {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease;
        }

        /* Quiz Styling */
        .quiz-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .explanation {
            display: none; /* Controlled by JS */
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            border-left: 6px solid #198754;
            font-size: 0.95rem;
        }

        .hover-bg-light:hover {
            background-color: #f1f3f5;
            cursor: pointer;
        }

        /* Weight Headers */
        .fw-black { font-weight: 900; letter-spacing: -0.5px; }
        .uppercase { text-transform: uppercase; letter-spacing: 1px; }

        /* Custom Scrollbar for DB lists */
        .db-scroll-list {
            max-height: 250px;
            overflow-y: auto;
            scrollbar-width: thin;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/">
                💡 MSAP Quiz Pipeline
            </a>
            <div class="ms-auto">
                <span class="text-muted small italic d-none d-md-inline">AI-Powered Exam Designer</span>
            </div>
        </div>
    </nav>

    <div class="container content-container">
        <!-- System Flash Messages (Success, Errors, Warnings) -->
        <div id="flash-container">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm border-0" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <!-- This is where index.html code is injected -->
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
